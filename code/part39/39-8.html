<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<ul>
    <li id="apple">Apple</li>
    <li id="banana">Banana</li>
    <li id="orange">Orange</li>
</ul>
<script>
  //태그 이름이 li인 요소 노드를 모두 탐색하여 반환합니다.
  //탐색된 요소 노드들은 HTMLCollection 객체에 담겨 반환됩니다.
  //HTMLCollection 객체는 유사 배열 객체이면서 이터러블입니다.
  const $elem = document.getElementsByTagName('li');

  //취득한 요소 노드의 style.color 프로퍼티 값을 변경합니다.
  //HTMLCollection 객체를 배열로 변환하여 순회하며 color 프로퍼티 값을 변경합니다.
  [...$elem].forEach($elem => {
    $elem.style.color = 'red';
  });
</script>
</body>
</html>
